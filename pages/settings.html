<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DSA Tracker — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f7f7; color: #1a1a1a; padding: 32px; max-width: 520px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 24px; }
    .section { background: #fff; border-radius: 10px; border: 1px solid #ebebeb; padding: 20px; margin-bottom: 16px; }
    .section-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .row label { font-size: 13px; color: #555; }
    .danger-btn {
      font-size: 13px; padding: 8px 18px; border: 1px solid #fcc;
      border-radius: 7px; background: #fff5f5; color: #c00; cursor: pointer;
    }
    .danger-btn:hover { background: #ffe0e0; }
    .info { font-size: 12px; color: #aaa; margin-top: 6px; }
    .storage-bar { background: #ebebeb; border-radius: 4px; height: 8px; margin: 10px 0; }
    .storage-fill { height: 8px; border-radius: 4px; background: #534AB7; }
  </style>
</head>
<body>
  <h1>⚙️ Settings</h1>

  <div class="section">
    <div class="section-title">Storage</div>
    <div id="storage-info">Loading…</div>
    <div class="storage-bar"><div class="storage-fill" id="storage-fill" style="width:0%"></div></div>
    <div class="info">Data is stored locally in Chrome. Use JSON backup to transfer between devices.</div>
  </div>

  <div class="section">
    <div class="section-title">Danger zone</div>
    <div class="row">
      <label>Clear all problem data</label>
      <button class="danger-btn" id="btn-clear">Clear all data</button>
    </div>
  </div>

  <script>
    chrome.storage.local.get(['dsa_problems'], (result) => {
      const problems = result.dsa_problems || [];
      const bytes = JSON.stringify(problems).length;
      const kb = (bytes / 1024).toFixed(1);
      const pct = Math.min((bytes / (10 * 1024 * 1024)) * 100, 100).toFixed(1);
      document.getElementById('storage-info').textContent =
        `${problems.length} problems · ${kb} KB used of 10 MB`;
      document.getElementById('storage-fill').style.width = pct + '%';
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
      if (confirm('This will permanently delete ALL your tracked problems. Are you sure?')) {
        chrome.storage.local.remove('dsa_problems', () => {
          alert('All data cleared.');
          window.close();
        });
      }
    });
  </script>
</body>
</html>
