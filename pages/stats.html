<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DSA Tracker — Stats</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f7f7; color: #1a1a1a; padding: 32px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .card { background: #fff; border-radius: 10px; padding: 18px 20px; border: 1px solid #ebebeb; }
    .card-val { font-size: 28px; font-weight: 700; }
    .card-lbl { font-size: 12px; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .section-title { font-size: 15px; font-weight: 600; margin: 24px 0 12px; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .bar-label { font-size: 12px; color: #555; width: 120px; flex-shrink: 0; }
    .bar-track { flex: 1; background: #ebebeb; border-radius: 4px; height: 8px; }
    .bar-fill { height: 8px; border-radius: 4px; }
    .bar-count { font-size: 11px; color: #888; width: 30px; text-align: right; }
  </style>
</head>
<body>
  <h1>📊 Your DSA Stats</h1>
  <div class="grid" id="summary-grid"></div>
  <div class="section-title">By difficulty</div>
  <div id="difficulty-bars"></div>
  <div class="section-title">By topic</div>
  <div id="topic-bars"></div>

  <script type="module">
    import { computeStats } from '../lib/stats.js';

    chrome.storage.local.get(['dsa_problems'], (result) => {
      const problems = result.dsa_problems || [];
      const stats = computeStats(problems);

      document.getElementById('summary-grid').innerHTML = `
        <div class="card"><div class="card-val">${stats.total}</div><div class="card-lbl">Total</div></div>
        <div class="card"><div class="card-val" style="color:#1D9E75">${stats.solved}</div><div class="card-lbl">Solved</div></div>
        <div class="card"><div class="card-val" style="color:#BA7517">${stats.revision}</div><div class="card-lbl">Revision</div></div>
        <div class="card"><div class="card-val" style="color:#534AB7">${stats.streak} 🔥</div><div class="card-lbl">Day streak</div></div>
      `;

      const diffColors = { easy: '#1D9E75', medium: '#EF9F27', hard: '#E24B4A' };
      const diffEl = document.getElementById('difficulty-bars');
      ['easy', 'medium', 'hard'].forEach((d) => {
        const count = stats.byDifficulty[d] || 0;
        const pct = stats.total ? Math.round((count / stats.total) * 100) : 0;
        diffEl.innerHTML += `<div class="bar-row">
          <div class="bar-label">${d.charAt(0).toUpperCase() + d.slice(1)}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${diffColors[d]}"></div></div>
          <div class="bar-count">${count}</div>
        </div>`;
      });

      const topicEl = document.getElementById('topic-bars');
      const sorted = Object.entries(stats.topicCount).sort((a, b) => b[1] - a[1]).slice(0, 10);
      const max = sorted[0]?.[1] || 1;
      sorted.forEach(([topic, count]) => {
        const pct = Math.round((count / max) * 100);
        topicEl.innerHTML += `<div class="bar-row">
          <div class="bar-label">${topic}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#7F77DD"></div></div>
          <div class="bar-count">${count}</div>
        </div>`;
      });
    });
  </script>
</body>
</html>
